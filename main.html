<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>原神怪物查询 - 主站</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #ffffff;
            font-family: "微软雅黑", "Microsoft YaHei", "PingFang SC", "Hiragino Sans GB", "Helvetica Neue", sans-serif;
            color: #1a1a1a;
            line-height: 1.5;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 0;
            position: relative;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .main-layout {
            display: flex;
            width: 100%;
            max-width: 1200px;
            min-height: 100vh;
            position: relative;
            gap: 0;
            padding: 1.5rem;
        }

        .left-panel {
            width: 80%;
            padding-right: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }

        .page-title {
            font-family: inherit;
            font-weight: 700;
            font-size: 1.8rem;
            color: #000000;
            letter-spacing: 0.5px;
            margin-bottom: 0.3rem;
        }

        .filter-section {
            background-color: #fafafa;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 1.2rem 1.4rem;
        }

        .filter-group {
            margin-bottom: 1rem;
        }

        .filter-group:last-child {
            margin-bottom: 0;
        }

        .filter-label {
            font-family: inherit;
            font-weight: 700;
            font-size: 0.9rem;
            color: #333333;
            margin-bottom: 0.5rem;
            display: block;
        }

        .filter-options {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }

        .version-row {
            display: flex;
            flex-wrap: wrap;
            gap: 0.4rem;
        }

        .filter-tag {
            font-family: inherit;
            font-weight: 400;
            font-size: 0.82rem;
            color: #444444;
            background-color: #ffffff;
            border: 1px solid #cccccc;
            border-radius: 5px;
            padding: 0.35rem 0.8rem;
            cursor: pointer;
            transition: all 0.2s ease;
            user-select: none;
            white-space: nowrap;
            -webkit-appearance: none;
            appearance: none;
        }

        .filter-tag:hover {
            background-color: #f0f0f0;
            border-color: #aaaaaa;
        }

        .filter-tag.active {
            background-color: #2c2c2c;
            color: #ffffff;
            border-color: #2c2c2c;
        }

        .filter-actions {
            display: flex;
            gap: 0.6rem;
            margin-top: 0.8rem;
            flex-wrap: wrap;
        }

        .filter-btn {
            font-family: inherit;
            font-weight: 400;
            font-size: 0.82rem;
            padding: 0.4rem 1.1rem;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 1px solid #cccccc;
            background-color: #ffffff;
            color: #444444;
            -webkit-appearance: none;
            appearance: none;
        }

        .filter-btn:hover {
            background-color: #f0f0f0;
        }

        .filter-btn.primary {
            background-color: #2c2c2c;
            color: #ffffff;
            border-color: #2c2c2c;
        }

        .filter-btn.primary:hover {
            background-color: #444444;
        }

        .monster-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.7rem;
        }

        .monster-card {
            font-family: inherit;
            font-weight: 400;
            font-size: 0.95rem;
            color: #1a1a1a;
            background-color: #fafafa;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 0.8rem 1rem;
            cursor: pointer;
            transition: all 0.15s ease;
            text-align: center;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            display: block;
        }

        .monster-card.hidden {
            display: none;
        }

        .monster-card:hover {
            background-color: #f0f0f0;
            border-color: #cccccc;
        }

        .monster-card:active {
            background-color: #e5e5e5;
        }

        .monster-card.selected {
            background-color: #2c2c2c;
            color: #ffffff;
            border-color: #2c2c2c;
        }

        .monster-card .card-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.25rem;
            justify-content: center;
            margin-top: 0.35rem;
        }

        .monster-card .card-tag {
            font-size: 0.7rem;
            background-color: rgba(0,0,0,0.06);
            padding: 0.15rem 0.45rem;
            border-radius: 8px;
            white-space: nowrap;
        }

        .monster-card.selected .card-tag {
            background-color: rgba(255,255,255,0.2);
        }

        .right-panel {
            position: fixed;
            top: 0;
            right: 0;
            width: 20%;
            height: 100vh;
            pointer-events: none;
            z-index: 50;
            overflow: visible;
        }

        .detail-panel {
            position: absolute;
            top: 0;
            right: 0;
            width: calc(100% + 2rem);
            height: 100%;
            background-color: #ffffff;
            border-left: 1px solid #d0d0d0;
            box-shadow: -6px 0 24px rgba(0, 0, 0, 0.1);
            z-index: 50;
            transform: translateX(100%);
            transition: transform 0.15s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            pointer-events: auto;
        }

        .detail-panel.active {
            transform: translateX(0);
        }

        .detail-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.8rem 1rem;
            border-bottom: 1px solid #eeeeee;
            flex-shrink: 0;
        }

        .detail-title {
            font-family: inherit;
            font-weight: 700;
            font-size: 1rem;
            color: #1a1a1a;
        }

        .detail-close {
            background: none;
            border: none;
            font-size: 1.5rem;
            line-height: 1;
            cursor: pointer;
            color: #888888;
            padding: 0 0.2rem;
            transition: color 0.15s;
            -webkit-appearance: none;
            appearance: none;
        }

        .detail-close:hover {
            color: #000000;
        }

        .detail-content {
            padding: 1rem;
            font-family: inherit;
            font-weight: 400;
            font-size: 0.9rem;
            color: #333333;
            line-height: 1.7;
            overflow-y: auto;
            flex: 1;
            word-break: break-word;
            white-space: pre-line;
        }

        .monster-empty {
            font-family: inherit;
            font-weight: 400;
            font-size: 0.9rem;
            color: #999999;
            text-align: center;
            padding: 2rem 0;
            grid-column: 1 / -1;
        }

        @media (max-width: 768px) {
            .main-layout {
                flex-direction: column;
                min-height: auto;
                padding: 0.8rem;
            }
            .left-panel {
                width: 100%;
                padding-right: 0;
            }
            .right-panel {
                width: 100%;
                position: fixed;
                top: 0;
                right: 0;
                bottom: 0;
                pointer-events: none;
                z-index: 100;
            }
            .detail-panel {
                position: fixed;
                top: auto;
                bottom: 0;
                left: 0;
                width: 100%;
                height: auto;
                max-height: 55vh;
                border-radius: 14px 14px 0 0;
                border-left: none;
                border-top: 1px solid #d0d0d0;
                transform: translateY(100%);
                box-shadow: 0 -6px 20px rgba(0,0,0,0.12);
                pointer-events: auto;
            }
            .detail-panel.active {
                transform: translateY(0);
            }
            .monster-grid {
                grid-template-columns: 1fr;
            }
            .page-title {
                font-size: 1.4rem;
            }
        }

        @media screen and (-webkit-min-device-pixel-ratio: 2),
               screen and (min-resolution: 192dpi) {
            body {
                -webkit-font-smoothing: antialiased;
                -moz-osx-font-smoothing: grayscale;
            }
        }
    </style>
</head>

    <script>
        (function() {
            const tag1Options = document.getElementById('tag1Options');
            const tag2Options = document.getElementById('tag2Options');
            const tag3Options = document.getElementById('tag3Options');
            const applyFilterBtn = document.getElementById('applyFilterBtn');
            const clearFilterBtn = document.getElementById('clearFilterBtn');

            const detailPanel = document.getElementById('detailPanel');

            let selectedFilters = {
                tag1: [],
                tag2: [],
                tag3: []
            };

            let currentSelectedMonster = null;

            const monsters = [
                {
                    name: '大型冰/岩史莱姆',
                    tag1: '普通怪',
                    tag2: '元素生命',
                    tag3: '1.0',
                    detail: '普通史莱姆中唯二带护盾的，分别具有8U冻盾/岩盾。\n拥有护盾时比较活跃，护盾被击破后活性降低，且一段时间后恢复。'
                },
                {
                    name: '飘浮灵',
                    tag1: '普通怪',
                    tag2: '元素生命',
                    tag3: '2.1',
                    detail: '不附着对应元素，但有对应元素的免疫；死亡后爆炸；拥有「怒气」机制：单次受伤达自身生命上限的18.75%/31.25%/43.75%/56.25%时，会积累20%/40%/70%/100%怒气。\n怒气达到100%后，飘浮灵可获得新技能，且亡语技能伤害提高，并获得额外效果：\n火：留下一个火种，造成二段高额伤害\n水：为大范围的飘浮灵回复20%血量\n风：留下一个风涡，持续牵引角色并造成伤害\n雷：剧烈膨胀并追踪玩家，一段时间后或接触到角色后爆炸\n草：为大范围的飘浮灵填满怒气\n冰：在地面留下冰霜，对站立于其中的角色造成伤害\n岩：大幅提高爆炸范围'
                },
                {
                    name: '无相之火',
                    tag1: '普通怪',
                    tag2: '元素生命',
                    tag3: '2.0',

                },
                {
                    name: '无相之水',
                    tag1: '普通怪',
                    tag2: '元素生命',
                    tag3: '2.1',
                    detail: '共性：会召唤方块保护核心，期间无敌，但可对直接露出的核心造成伤害。核心免疫对应元素，且拥有对应元素附着。但不同的元素之间的机制几乎截然不同。\n常态下可以召唤自爆水滴和与愈疗水滴（均具有2U水盾）：自爆水滴会在靠近角色后自爆，但如果无相之水也被波及，则其立刻露出核心供攻击；愈疗水滴可以喷射水晶球，角色/首领吸收可回复50%/10%生命上限血量；濒死时立刻召唤3个具有2U水盾的大水滴，缓慢地从边缘移动至首领，我方需用元素反应击杀水滴，否则首领每吸收1个都将回复15%血量'
                },
                {
                    name: '无相之风',
                    tag1: '普通怪',
                    tag2: '元素生命',
                    tag3: '1.0',

                },
                {
                    name: '无相之雷',
                    tag1: '普通怪',
                    tag2: '元素生命',
                    tag3: '1.0',
                    detail: '共性：会召唤方块保护核心，期间无敌，但可对直接露出的核心造成伤害。核心免疫对应元素，且拥有对应元素附着。但不同的元素之间的机制几乎截然不同。\n可召唤雷柱领域困住角色，雷柱具有4.4U雷盾，击破后可越狱攻击核心；濒死时会召唤3个具有3U雷盾的雷棱镜，破坏后可产生1个雷元素晶球。15s内破坏3个可直接击杀首领，反之首领回复(剩余雷棱镜数量×15%)的血量，但若本次破坏了一定数量的雷棱镜，则下次濒死时召唤的雷棱镜数量也将减少此次破坏的数量'

                    tag2: '元素生命',
                    tag3: '3.2',
                    detail: '共性：会召唤方块保护核心，期间无敌，但可对直接露出的核心造成伤害。核心免疫对应元素，且拥有对应元素附着。但不同的元素之间的机制几乎截然不同。\n战斗中会召唤一些草元素造物，这些造物均具有2U木盾，可被火元素破坏以获得战斗优势；濒死时获得48U木逆盾，受到草伤+0.88U，被燃烧后每秒-0.4U，期间会召唤4个草芯，草芯受到草元素伤害可开始净化首领，在此基础上受到雷元素伤害还将被活化，受到正常草芯净化+1.04U，受到活化草芯净化+3.2U；完成净化后首领将被击败，反之根据净化的次数，每净化1/2/2+次回复50%/25%/12.5%血量'
                },
                {
                    name: '无相之冰',
                    tag1: '普通怪',
                    tag2: '元素生命',
                    tag3: '1.2',
                    detail: '共性：会召唤方块保护核心，期间无敌，但可对直接露出的核心造成伤害。核心免疫对应元素，且拥有对应元素附着。但不同的元素之间的机制几乎截然不同。\n濒死时会获得88U冻盾，且首领每3s回复一次血量，复苏次数为1/2/2+时，每次回复5%/2.5%/1.25%血量，最多回复10次，10次后结束濒死状态；濒死期间会扔出霜之实，使用重击可使其滚动，命中首领可直接破除40U盾量；冻盾被破除后，首领露出核心，期间可被直接击杀'
                },
                {
                    name: '无相之岩',
                    tag1: '普通怪',
                    tag2: '元素生命',
                    tag3: '1.0',
                    detail: '共性：会召唤方块保护核心，期间无敌，但可对直接露出的核心造成伤害。核心免疫对应元素，且拥有对应元素附着。但不同的元素之间的机制几乎截然不同。\n首领会站上召唤的岩柱（24U岩盾，击破可产生1~2岩晶球）上，击破首领所在的岩柱可使其坠落，暴露核心；战斗中会召唤具有3U岩盾的岩块，击破后可产生一个护罩，可用于抵御首领的部分强力攻击；濒死时，首领召唤3个复苏岩柱（具有8U岩盾，击破后产生1~2个岩元素晶球），15s内击破可使首领直接被击败，反之首领回复(剩余岩柱数量×15%)的血量，但若本次破坏了一定数量的岩柱，则下次濒死时召唤的岩柱数量也将减少此次破坏的数量
                },
                {
                    name: '霜夜灵嗣',
                    tag1: '普通怪',
                    tag2: '元素生命',
                    tag3: '6.0',
                    detail: '霜夜灵嗣机制详情'
                }
            ];

            function sortByVersion(monsterList) {
                return monsterList.sort((a, b) => {
                    const versionA = parseFloat(a.tag3);
                    const versionB = parseFloat(b.tag3);
                    return versionA - versionB;
                });
            }

            function renderAllMonsters() {
                const sorted = sortByVersion([...monsters]);
                monsterGrid.innerHTML = sorted.map(monster => `
                    <div class="monster-card${currentSelectedMonster && currentSelectedMonster.name === monster.name ? ' selected' : ''}" data-name="${monster.name}">
                        <div>${monster.name}</div>
                        <div class="card-tags">
                            <span class="card-tag">${monster.tag1}</span>
                            <span class="card-tag">${monster.tag2}</span>
                            <span class="card-tag">v${monster.tag3}</span>
                        </div>
                    </div>
                `).join('');

                document.querySelectorAll('.monster-card').forEach(card => {
                    card.addEventListener('click', function() {
                        const name = this.dataset.name;
                        selectMonster(name);
                    });
                });

                applyVisibilityFilter();
            }

            function applyVisibilityFilter() {
                const activeFilterCount = selectedFilters.tag1.length + 
                                         selectedFilters.tag2.length + 
                                         selectedFilters.tag3.length;

                document.querySelectorAll('.monster-card').forEach(card => {
                    const name = card.dataset.name;
                    const monster = monsters.find(m => m.name === name);
                    if (!monster) return;

                    if (activeFilterCount === 0) {
                        card.classList.remove('hidden');
                        return;
                    }

                    let visible = true;
                    if (selectedFilters.tag1.length > 0 && !selectedFilters.tag1.includes(monster.tag1)) visible = false;
                    if (selectedFilters.tag2.length > 0 && !selectedFilters.tag2.includes(monster.tag2)) visible = false;
                    if (selectedFilters.tag3.length > 0 && !selectedFilters.tag3.includes(monster.tag3)) visible = false;

                    if (visible) {
                        card.classList.remove('hidden');
                    } else {
                        card.classList.add('hidden');
                    }
                });

                const visibleCards = document.querySelectorAll('.monster-card:not(.hidden)');
                const existingEmpty = document.querySelector('.monster-empty');
                
                if (visibleCards.length === 0 && activeFilterCount > 0) {
                    if (!existingEmpty) {
                        const emptyMsg = document.createElement('div');
                        emptyMsg.className = 'monster-empty';
                        emptyMsg.textContent = '没有符合筛选条件的怪物';
                        monsterGrid.appendChild(emptyMsg);
                    }
                } else {
                    if (existingEmpty) {
                        existingEmpty.remove();
                    }
                }
            }

            function selectMonster(name) {
                const monster = monsters.find(m => m.name === name);
                if (!monster) return;

                if (currentSelectedMonster && currentSelectedMonster.name === name) {
                    return;
                }

                if (currentSelectedMonster) {
                    detailPanel.classList.remove('active');
                    setTimeout(() => {
                        updateDetailPanel(monster);
                        detailPanel.classList.add('active');
                    }, 150);
                } else {
                    updateDetailPanel(monster);
                    detailPanel.classList.add('active');
                }

                currentSelectedMonster = monster;
                refreshCardSelection();
            }

            function updateDetailPanel(monster) {
                detailTitle.textContent = monster.name;
                detailContent.textContent = monster.detail;
            }

            function closeDetailPanel() {
                detailPanel.classList.remove('active');
                currentSelectedMonster = null;
                refreshCardSelection();
            }

            function refreshCardSelection() {
                document.querySelectorAll('.monster-card').forEach(card => {
                    const name = card.dataset.name;
                    if (currentSelectedMonster && currentSelectedMonster.name === name) {
                        card.classList.add('selected');
                    } else {
                        card.classList.remove('selected');
                    }
                });
            }

            function handleTagClick(e) {
                const tag = e.target.closest('.filter-tag');
                if (!tag) return;

                const tagGroup = tag.dataset.tag;
                const tagValue = tag.dataset.value;

                if (selectedFilters[tagGroup].includes(tagValue)) {
                    selectedFilters[tagGroup] = selectedFilters[tagGroup].filter(v => v !== tagValue);
                    tag.classList.remove('active');
                } else {
                    selectedFilters[tagGroup].push(tagValue);
                    tag.classList.add('active');
                }

                applyVisibilityFilter();
            }

            function clearAllFilters() {
                selectedFilters = {
                    tag1: [],
                    tag2: [],
                    tag3: []
                };

                document.querySelectorAll('.filter-tag').forEach(tag => {
                    tag.classList.remove('active');
                });

                applyVisibilityFilter();
            }

            tag1Options.addEventListener('click', handleTagClick);
            tag2Options.addEventListener('click', handleTagClick);
            tag3Options.addEventListener('click', handleTagClick);

            clearFilterBtn.addEventListener('click', clearAllFilters);

            applyFilterBtn.addEventListener('click', function() {
                applyVisibilityFilter();
            });

            detailCloseBtn.addEventListener('click', closeDetailPanel);

            renderAllMonsters();
        })();
    </script>
</body>
</html>

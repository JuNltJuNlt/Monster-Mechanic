<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>原神全怪物详细机制查询</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #ffffff;
            font-family: "微软雅黑", "Microsoft YaHei", "PingFang SC", "Hiragino Sans GB", "Helvetica Neue", sans-serif;
            color: #1a1a1a;
            line-height: 1.5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 7rem 1.5rem 1.5rem;
            position: relative;
            overflow-x: hidden;
        }

        .main-container {
            width: 100%;
            max-width: 780px;
            margin: 0 auto;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
        }

        .main-title {
            font-family: inherit;
            font-weight: 700;
            font-size: 2.5rem;
            letter-spacing: 0.5px;
            color: #000000;
            word-break: break-word;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            margin-bottom: 0.3rem;
            margin-top: 2rem;
        }

        .sub-title {
            font-family: inherit;
            font-weight: 400;
            font-size: 1.15rem;
            color: #333333;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 0.2rem;
            margin-bottom: 1rem;
        }

        .sub-title a {
            text-decoration: none;
            color: #1a0dab;
            font-weight: 400;
            transition: color 0.2s ease, text-decoration 0.2s ease;
            border-bottom: 1px solid transparent;
        }

        .sub-title a:hover {
            color: #5c3d99;
            text-decoration: underline;
            border-bottom: 1px solid #5c3d99;
        }

        .sub-title a:visited {
            color: #1a0dab;
        }

        .top-right-panel {
            position: fixed;
            top: 1.8rem;
            right: 2.2rem;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 0.7rem;
            z-index: 10;
        }

        .current-time {
            font-family: inherit;
            font-weight: 400;
            font-size: 0.95rem;
            color: #2d2d2d;
            letter-spacing: 0.3px;
            white-space: nowrap;
            text-align: right;
        }

        .top-links {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 0.4rem;
        }

        .top-links a {
            font-family: inherit;
            font-weight: 400;
            font-size: 0.9rem;
            color: #1a0dab;
            text-decoration: none;
            white-space: nowrap;
            transition: color 0.2s, text-decoration 0.2s;
            border-bottom: 1px solid transparent;
        }

        .top-links a:hover {
            color: #5c3d99;
            text-decoration: underline;
            border-bottom: 1px solid #5c3d99;
        }

        .top-links a:visited {
            color: #1a0dab;
        }

        .bottom-buttons {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2.8rem;
            width: 100%;
            max-width: 320px;
            margin-top: 3.5rem;
            margin-bottom: auto;
            padding-bottom: 1rem;
        }

        .bottom-btn {
            font-family: inherit;
            font-weight: 400;
            font-size: 1.05rem;
            color: #1a1a1a;
            background-color: #f5f5f5;
            border: 1px solid #cccccc;
            border-radius: 6px;
            padding: 0.75rem 2.2rem;
            width: 100%;
            cursor: pointer;
            transition: background-color 0.2s ease, border-color 0.2s ease;
            text-align: center;
            -webkit-appearance: none;
            appearance: none;
        }

        .bottom-btn:hover {
            background-color: #e8e8e8;
            border-color: #aaaaaa;
        }

        .bottom-btn:active {
            background-color: #dddddd;
        }

        .slide-panel {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 66.67vh;
            background-color: #ffffff;
            border-top: 1px solid #cccccc;
            border-radius: 14px 14px 0 0;
            box-shadow: 0 -6px 20px rgba(0, 0, 0, 0.1);
            z-index: 100;
            transform: translateY(100%);
            transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            padding: 1.4rem 1.8rem 1.8rem;
        }

        .slide-panel.active {
            transform: translateY(0);
        }

        .panel-header {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            margin-bottom: 0.6rem;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 2rem;
            line-height: 1;
            cursor: pointer;
            color: #555555;
            padding: 0 0.2rem;
            transition: color 0.2s;
            -webkit-appearance: none;
            appearance: none;
        }

        .close-btn:hover {
            color: #000000;
        }

        .panel-content {
            font-family: inherit;
            font-weight: 400;
            font-size: 1.05rem;
            color: #2d2d2d;
            line-height: 2;
            overflow-y: auto;
            flex: 1;
            word-break: break-word;
            white-space: pre-line;
        }

        @media (max-width: 650px) {
            body {
                padding: 6rem 1rem 1rem;
            }
            .top-right-panel {
                top: 0.8rem;
                right: 1rem;
                gap: 0.5rem;
            }
            .current-time {
                font-size: 0.85rem;
            }
            .top-links a {
                font-size: 0.8rem;
            }
            .main-title {
                font-size: 2rem;
                margin-top: 1.5rem;
            }
            .sub-title {
                font-size: 1rem;
            }
            .bottom-btn {
                font-size: 0.95rem;
                padding: 0.7rem 1.8rem;
            }
            .bottom-buttons {
                gap: 2.2rem;
                margin-top: 2.8rem;
            }
            .slide-panel {
                height: 66.67vh;
                padding: 1.2rem 1.2rem 1.5rem;
                border-radius: 12px 12px 0 0;
            }
        }

        @media screen and (-webkit-min-device-pixel-ratio: 2),
               screen and (min-resolution: 192dpi) {
            body {
                -webkit-font-smoothing: antialiased;
                -moz-osx-font-smoothing: grayscale;
            }
        }
    </style>
</head>
<body>
    <div class="top-right-panel">
        <div class="current-time" id="liveTime"></div>
        <div class="top-links">
            <a href="https://junltjunlt.github.io/Enemy-Lineup-Inquiry/" target="_blank" rel="noopener noreferrer">有需要查询深渊阵容的可点这里</a>
            <a href="https://junltjunlt.github.io/HP-Calculator-JuNltJuNlt/" target="_blank" rel="noopener noreferrer">有需要怪物血量计算的可点这里</a>
        </div>
    </div>

    <div class="main-container">
        <h1 class="main-title">原神全怪物详细机制查询</h1>
        <div class="sub-title">
            <span>整理/中译中：</span>
            <a href="https://space.bilibili.com/630367190" target="_blank" rel="noopener noreferrer">@くんりんてんか_q</a>
        </div>
    </div>

    <div class="bottom-buttons">
        <button class="bottom-btn" id="previewBtn">用前必看</button>
        <button class="bottom-btn" id="enterBtn">进入主站</button>
    </div>

    <div class="slide-panel" id="slidePanel">
        <div class="panel-header">
            <button class="close-btn" id="closePanelBtn" aria-label="关闭">×</button>
        </div>
        <div class="panel-content" id="panelContent"></div>
    </div>

    <script>
        (function() {
            const timeElement = document.getElementById('liveTime');

            function padZero(num) {
                return num < 10 ? '0' + num : num;
            }

            function updateClock() {
                const now = new Date();
                const year = now.getFullYear();
                const month = padZero(now.getMonth() + 1);
                const day = padZero(now.getDate());
                const hours = padZero(now.getHours());
                const minutes = padZero(now.getMinutes());
                const seconds = padZero(now.getSeconds());
                const timeString = `${year}/${month}/${day}   ${hours}:${minutes}:${seconds}`;
                if (timeElement) {
                    timeElement.textContent = timeString;
                }
            }

            updateClock();
            setInterval(updateClock, 1000);

            const previewBtn = document.getElementById('previewBtn');
            const slidePanel = document.getElementById('slidePanel');
            const closePanelBtn = document.getElementById('closePanelBtn');
            const panelContent = document.getElementById('panelContent');

            const previewText = `本网站仅对存在【特殊机制】（元素护盾、特殊阶段）的怪物作解析，对无特殊机制（如丘丘人、盗宝团成员）不作解析。

本网站所有内容都为正式服已上线内容，不会有任何未上线内容。文本参考：析茉Csxylic（米游社）

所有机制均为本人在深入了解怪物机制后重写的中译中，在确保完整的基础上做到简单易懂，此外，对深渊特化、深渊能否入场秒杀作了强调。

另外，危战不是本人强项，并且b站上有危战图做的很好的up主，所以暂时没有总结危战机制的计划。

本网站没有任何盈利内容。个人对本网站有不成熟的外号"玉米杯数据库"，希望在原魔上起到和玉衡杯相同的作用，但也想做出一定的差异。

（关于观感的问题：本网站是纯文字网站，配图的话对我来说相当复杂，因此没有配备1张图片，可能导致观感不好）`;

            if (previewBtn && slidePanel && closePanelBtn) {
                previewBtn.addEventListener('click', function() {
                    panelContent.textContent = previewText;
                    slidePanel.classList.add('active');
                });

                closePanelBtn.addEventListener('click', function() {
                    slidePanel.classList.remove('active');
                });

                slidePanel.addEventListener('click', function(e) {
                    if (e.target === slidePanel) {
                        slidePanel.classList.remove('active');
                    }
                });
            }

            const enterBtn = document.getElementById('enterBtn');
            if (enterBtn) {
                enterBtn.addEventListener('click', function() {
                    window.location.href = 'main.html';
                });
            }
        })();
    </script>
</body>
</html>
